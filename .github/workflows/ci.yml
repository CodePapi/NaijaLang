name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          # caching is handled per-package below if desired; omit root cache

      - name: Install backend dependencies
        working-directory: ai-model
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint backend
        working-directory: ai-model
        run: npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: ai-model
        run: npm run format -- --check

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run backend tests
        working-directory: ai-model
        run: npm run test -- --runInBand

      - name: Run frontend lints again (optional sanity)
        working-directory: frontend
        run: npm run lint
